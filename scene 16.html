<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scene 112 - X8 Ultra vs Vivo X200 Ultra</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#viewer{
    position:relative;
    width:1200px;
    height:760px;
    overflow:hidden;
    background:black;
    border:2px solid #666;
    box-shadow:0 0 30px rgba(0,0,0,.7);
    touch-action:none;
    cursor:grab;
}

#viewer:active{
    cursor:grabbing;
}

#leftPane,
#rightPane{
    position:absolute;
    top:0;
    height:calc(100% - 88px);
    width:50%;
    overflow:hidden;
}

#leftPane{left:0;}
#rightPane{right:0;}

#leftImg,
#rightImg{
    position:absolute;
    top:0;
    left:0;
    user-select:none;
    pointer-events:none;
    -webkit-user-drag:none;
}

#divider{
    position:absolute;
    left:50%;
    top:0;
    width:3px;
    height:calc(100% - 88px);
    background:white;
    transform:translateX(-50%);
    z-index:1000;
    box-shadow:0 0 8px rgba(255,255,255,.7);
}

#watermarks{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:88px;
    display:grid;
    grid-template-columns:1fr 1fr;
    z-index:1500;
}

.wm{
    position:relative;
    padding:18px 24px;
    box-sizing:border-box;
}

.wm-x8{
    background:#f3f3f3;
    color:#111;
}

.wm-vivo{
    background:#000;
    color:#fff;
}

.wm-phone{
    font-size:20px;
    margin-bottom:10px;
}

.wm-meta{
    font-size:14px;
    opacity:.75;
}

.wm-logo{
    position:absolute;
    right:18px;
    top:6px;
    font-size:70px;
    font-style:italic;
    font-weight:700;
}

.vivo-wrap{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:100%;
}

.vivo-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.vivo-name{
    font-size:20px;
    color:#fff;
}

.zeiss{
    background:#1d4ed8;
    color:#fff;
    padding:5px 10px;
    font-size:13px;
    font-weight:700;
}

.vivo-meta{
    color:#fff;
    font-size:14px;
}

</style>
</head>

<body>

<div id="viewer">

    <div id="leftPane">
        <img id="leftImg"
        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiSQkD9cSppW2lpst52RbOElraqHnCPBtuCAB9PiXNbr0lnp4XeD5IfLTMXFlQvLEVDiyVkauQElKMOyiCk2phjx4-dRC2QwBDUMyFVbx4XxFaPAE9-VBDjfnwSzuhzqtmAeEv1ddsCXw-5DJ8spZRLEl1Oj8BOpNMeMl2o7Pq1HKQT3XYnXvYfy5x8rwXz/s16000/112_x8u%20iso50%20ss1:950.jpg">
    </div>

    <div id="rightPane">
        <img id="rightImg"
        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhhUKZ2kuLlRu7-EUHFCNc0QZfdjU7wRWOkKQ1stLj6c3F9HI_HbL0JQAnXj7ZjstPbIgA2itYsh0tNclA47DDoq1LrpJiftKmzbuMdKLuVqsLGH1LuVzvJFrR9Vn_KUfEu6APq9c6gwbj-jZy_VgY9HMJGOao_CAiugV9ByUhVQVr8KCxa14PUUJQAvslw/s16000/112_x200u%20iso50%20ss1:599.jpg">
    </div>

    <div id="divider"></div>

    <div id="watermarks">

        <div class="wm wm-x8">

            <div class="wm-phone">
                OPPO Find X8 Ultra
            </div>

            <div class="wm-meta">
                70mm &nbsp;&nbsp; f/2.1 &nbsp;&nbsp; 1/950s &nbsp;&nbsp; ISO50
            </div>

            <div class="wm-logo">H</div>

        </div>

        <div class="wm wm-vivo">

            <div class="vivo-wrap">

                <div class="vivo-left">

                    <div class="vivo-name">
                        Vivo X200 Ultra
                    </div>

                    <div class="zeiss">
                        ZEISS
                    </div>

                </div>

                <div class="vivo-meta">
                    85mm &nbsp;&nbsp; f/2.3 &nbsp;&nbsp; 1/599s &nbsp;&nbsp; ISO50
                </div>

            </div>

        </div>

    </div>

</div>

<script>

const viewer=document.getElementById('viewer');
const leftImg=document.getElementById('leftImg');
const rightImg=document.getElementById('rightImg');

let panX=0;
let panY=0;

function update(){
leftImg.style.transform=`translate(${panX}px,${panY}px)`;
rightImg.style.transform=`translate(${panX}px,${panY}px)`;
}

leftImg.onload=function(){
panX=(viewer.clientWidth/2)-(leftImg.naturalWidth/2);
panY=((viewer.clientHeight-88)/2)-(leftImg.naturalHeight/2);
update();
};

let dragging=false;
let startX=0;
let startY=0;

viewer.addEventListener('pointerdown',e=>{
dragging=true;
startX=e.clientX;
startY=e.clientY;
});

window.addEventListener('pointerup',()=>{
dragging=false;
});

window.addEventListener('pointermove',e=>{
if(!dragging)return;

panX+=(e.clientX-startX)*2;
panY+=(e.clientY-startY)*2;

startX=e.clientX;
startY=e.clientY;

update();
});

</script>

</body>
</html>
