<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scene 999 - X8 Ultra vs X9 Pro</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#viewer{
    position:relative;
    width:1200px;
    height:760px;
    overflow:hidden;
    background:black;
    border:2px solid #666;
    box-shadow:0 0 30px rgba(0,0,0,.7);
    touch-action:none;
    cursor:grab;
}

#viewer:active{
    cursor:grabbing;
}

#leftPane,
#rightPane{
    position:absolute;
    top:0;
    height:calc(100% - 88px);
    width:50%;
    overflow:hidden;
}

#leftPane{
    left:0;
}

#rightPane{
    right:0;
}

#leftImg,
#rightImg{
    position:absolute;
    top:0;
    left:0;
    user-select:none;
    pointer-events:none;
    -webkit-user-drag:none;
}

#divider{
    position:absolute;
    left:50%;
    top:0;
    width:3px;
    height:calc(100% - 88px);
    background:white;
    transform:translateX(-50%);
    z-index:1000;
    box-shadow:0 0 8px rgba(255,255,255,.7);
}

#watermarks{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:88px;
    display:grid;
    grid-template-columns:1fr 1fr;
    z-index:1500;
}

.wm{
    position:relative;
    padding:18px 24px;
    box-sizing:border-box;
}

.wm-x8{
    background:#f3f3f3;
    color:#111;
}

.wm-x9{
    background:#000;
    color:#fff;
}

.wm-phone{
    font-size:20px;
    font-weight:400;
    margin-bottom:10px;
}

.wm-meta{
    font-size:14px;
    opacity:.7;
}

.wm-logo{
    position:absolute;
    right:18px;
    top:6px;
    font-size:70px;
    font-style:italic;
    font-weight:700;
    line-height:1;
}

</style>

</head>

<body>

<div id="viewer">

    <div id="leftPane">
        <img id="leftImg"
        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjTOgWRzUhRX6IyFo25LScEP0YhnIPIpWtDkEmf4D4hIb2eQLNgeIcdlFWm8O1pyExpjurJDaxKbWHTN77yJxNNTkVDnmpPpz66onWC1J6xu1kWfKy5tXFZGbjts_1d7eFamvl9OjrGp_CnQeqzYsGTa5HZDQBsaCcAfQWfQpUpc5EFiEdkMh6uLFiL6pPJ/s16000/999_x8u%20iso50%20ss1:340.jpg">
    </div>

    <div id="rightPane">
        <img id="rightImg"
        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhZl2FFBRld8IbiPz9wcFkZ1Vk3tBgr1UEY88KRuo1caB0qxzdOho1nE53K2Jj9tUxMvGjYI9Jxm5Slnhb-QCZQMFp8wf0GTGF82xu068O6COh03xgRCkrPL-A9m7DWDzC0_Zx3OnFrDyaK5smp8_qNOqE1Nk2yldIELvVhCtKpmJKlqjiiOcMiXD5B5Nt6/s16000/999_x9p%20iso50%20ss1:150.jpg">
    </div>

    <div id="divider"></div>

    <div id="watermarks">

        <div class="wm wm-x8">

            <div class="wm-phone">
                OPPO Find X8 Ultra
            </div>

            <div class="wm-meta">
                70mm &nbsp;&nbsp; f/2.1 &nbsp;&nbsp; 1/340s &nbsp;&nbsp; ISO50
            </div>

            <div class="wm-logo">
                H
            </div>

        </div>

        <div class="wm wm-x9">

            <div class="wm-phone">
                OPPO Find X9 Pro
            </div>

            <div class="wm-meta">
                70mm &nbsp;&nbsp; f/2.1 &nbsp;&nbsp; 1/150s &nbsp;&nbsp; ISO50
            </div>

            <div class="wm-logo">
                H
            </div>

        </div>

    </div>

</div>

<script>

const viewer = document.getElementById('viewer');
const leftImg = document.getElementById('leftImg');
const rightImg = document.getElementById('rightImg');

let panX = 0;
let panY = 0;

function update(){

    leftImg.style.transform =
        `translate(${panX}px,${panY}px)`;

    rightImg.style.transform =
        `translate(${panX}px,${panY}px)`;

}

leftImg.onload = function(){

    panX =
        (viewer.clientWidth / 2)
        - (leftImg.naturalWidth / 2);

    panY =
        ((viewer.clientHeight - 88) / 2)
        - (leftImg.naturalHeight / 2);

    update();

};

let dragging = false;
let startX = 0;
let startY = 0;

viewer.addEventListener('pointerdown',e=>{

    dragging = true;

    startX = e.clientX;
    startY = e.clientY;

});

window.addEventListener('pointerup',()=>{

    dragging = false;

});

window.addEventListener('pointermove',e=>{

    if(!dragging) return;

    panX += (e.clientX - startX) * 4;
    panY += (e.clientY - startY) * 4;

    startX = e.clientX;
    startY = e.clientY;

    update();

});

</script>

</body>
</html>
