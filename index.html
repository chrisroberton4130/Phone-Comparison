<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#viewer{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    touch-action:none;
}

img{
    position:absolute;
    top:0;
    left:0;
    width:8192px;
    height:auto;
}

#left{
    clip-path: inset(0 50% 0 0);
}

#right{
    clip-path: inset(0 0 0 50%);
}

#divider{
    position:absolute;
    left:50%;
    top:0;
    width:4px;
    height:100%;
    background:white;
    z-index:999;
}
</style>
</head>

<body>

<div id="viewer">

<img id="left"
src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEivfMTqbuowVAwXP9I2qcq1fS3SI3bC8tdgntU-hTlk91cGhpKUXwhKE_VGh3qSbGERPsJmH6szBAXZLsrEHe_HkFY2fQIpPoaOBc2OhcZeIG6p3W5knN7V2MeNpviOGJWBNyteYgvMkvZr2-EezYAhbb7oG2z3fjwf3Ya8-rfgZChdK1chsraXxaA7zgE0/s16000/IMG20260616232617_0001_x8u.jpg">

<img id="right"

<div id="divider"></div>

</div>

<script>

let x = -3500;
let y = -2500;

const left = document.getElementById('left');
const right = document.getElementById('right');

function update(){
    left.style.transform =
        `translate(${x}px,${y}px)`;

    right.style.transform =
        `translate(${x}px,${y}px)`;
}

update();

let dragging = false;
let startX = 0;
let startY = 0;

document.getElementById('viewer')
.addEventListener('pointerdown',e=>{
    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
});

window.addEventListener('pointerup',()=>{
    dragging = false;
});

window.addEventListener('pointermove',e=>{

    if(!dragging) return;

    x += e.clientX - startX;
    y += e.clientY - startY;

    startX = e.clientX;
    startY = e.clientY;

    update();
});

</script>

</body>
</html>
