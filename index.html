<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Phone Comparison</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

#viewer{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    touch-action:none;
}

#leftPane,
#rightPane{
    position:absolute;
    top:0;
    bottom:0;
    width:50%;
    overflow:hidden;
}

#leftPane{
    left:0;
}

#rightPane{
    right:0;
}

#leftImg,
#rightImg{
    position:absolute;
    top:0;
    left:0;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
}

#divider{
    position:absolute;
    left:50%;
    top:0;
    width:3px;
    height:100%;
    background:white;
    z-index:999;
    transform:translateX(-50%);
}

#labelA,
#labelB{
    position:absolute;
    top:20px;
    z-index:1000;
    padding:10px 16px;
    background:rgba(0,0,0,.6);
    color:white;
    font-family:sans-serif;
    font-size:18px;
    border-radius:8px;
}

#labelA{
    left:20px;
}

#labelB{
    right:20px;
}

</style>
</head>

<body>

<div id="viewer">

    <div id="leftPane">
        <img id="leftImg"
        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEivfMTqbuowVAwXP9I2qcq1fS3SI3bC8tdgntU-hTlk91cGhpKUXwhKE_VGh3qSbGERPsJmH6szBAXZLsrEHe_HkFY2fQIpPoaOBc2OhcZeIG6p3W5knN7V2MeNpviOGJWBNyteYgvMkvZr2-EezYAhbb7oG2z3fjwf3Ya8-rfgZChdK1chsraXxaA7zgE0/s16000/IMG20260616232617_0001_x8u.jpg">
    </div>

    <div id="rightPane">
        <img id="rightImg"
        src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEigCCigDUdm814BgCthH8NHTYLjvRCvfpatFazRL6y_Y1XhtitBEkZoT7h03CZKntygDdCV7Wdex7ZWV6eMoYzbzFtHWp2SSf3-m5ETHN8aHBF7-g_yWbvLnMpMitg1kKq46sc2Fx0g6hQNBp_3eo8CM1B5SWn4NCM33LRhuJhl48w6zyEFL7wtSOjzLVM3/s8057/IMG20260616232617_0000_x9p.jpg">
    </div>

    <div id="divider"></div>

    <div id="labelA">X8 Ultra</div>
    <div id="labelB">X9 Pro</div>

</div>

<script>

const viewer = document.getElementById('viewer');

const leftImg = document.getElementById('leftImg');
const rightImg = document.getElementById('rightImg');

let x = -3500;
let y = -2500;

function update(){

    leftImg.style.transform =
        `translate(${x}px,${y}px)`;

    rightImg.style.transform =
        `translate(${x}px,${y}px)`;

}

update();

let dragging = false;
let startX = 0;
let startY = 0;

viewer.addEventListener('pointerdown',(e)=>{

    dragging = true;
    startX = e.clientX;
    startY = e.clientY;

});

window.addEventListener('pointermove',(e)=>{

    if(!dragging) return;

    x += e.clientX - startX;
    y += e.clientY - startY;

    startX = e.clientX;
    startY = e.clientY;

    update();

});

window.addEventListener('pointerup',()=>{

    dragging = false;

});

window.addEventListener('pointercancel',()=>{

    dragging = false;

});

</script>

</body>
</html>
